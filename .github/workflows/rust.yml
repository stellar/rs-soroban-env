name: Rust

on:
  push:
    branches: [main, release/**]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_protected == 'true' && github.sha || github.ref }}-{{ github.event_name }}
  cancel-in-progress: true

jobs:

  complete:
    if: always()
    # temporarily disabling publish-dry-run, it appears to be broken with recent
    # changes to dependency specifications?
    # needs: [fmt, cackle, cargo-deny, check-git-rev-deps, build-and-test, publish-dry-run]
    needs: [fmt, cackle, cargo-deny, check-git-rev-deps, semver-checks, build-and-test]
    runs-on:
      - namespace-profile-noble-24-04-stellar-core-x64-small
    steps:
    - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
      run: exit 1

  fmt:
    runs-on:
      - namespace-profile-noble-24-04-stellar-core-x64-small
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: namespacelabs/nscloud-setup@v0
    - uses: namespacelabs/nscloud-checkout-action@v7
    - run: rustup update
    - run: cargo fmt --all --check

  cackle:
    runs-on:
      - namespace-profile-noble-24-04-stellar-core-x64-small
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: namespacelabs/nscloud-setup@v0
      - uses: namespacelabs/nscloud-checkout-action@v7
      - uses: cackle-rs/cackle-action@997327f77e59d9cda7b0b6217f0fbdbd3f3ca904
      - run: cargo acl -n run

  cargo-deny:
    runs-on:
      - namespace-profile-noble-24-04-stellar-core-x64-small
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        checks:
          - advisories
          - bans licenses sources
    # Prevent sudden announcement of a new advisory from failing ci:
    continue-on-error: ${{ matrix.checks == 'advisories' }}
    steps:
    - uses: namespacelabs/nscloud-setup@v0
    - uses: namespacelabs/nscloud-checkout-action@v7
    - uses: EmbarkStudios/cargo-deny-action@76cd80eb775d7bbbd2d80292136d74d39e1b4918
      with:
        command: check ${{ matrix.checks }}

  check-git-rev-deps:
    runs-on:
      - namespace-profile-noble-24-04-stellar-core-x64-small
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: namespacelabs/nscloud-setup@v0
    - uses: namespacelabs/nscloud-checkout-action@v7
    - uses: stellar/actions/rust-check-git-rev-deps@main

  semver-checks:
    # When a PR enters the merge queue, the event context changes from pull_request to merge_group,
    # so github.event.pull_request becomes null/empty, so we don't do this check in the merge queue.
    if: "!contains( github.event.pull_request.labels.*.name, 'skip-semver-checks') && github.event_name != 'merge_group'"
    runs-on:
      - namespace-profile-noble-24-04-stellar-core-x64-small
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: namespacelabs/nscloud-setup@v0
    - uses: namespacelabs/nscloud-checkout-action@v7
    - run: rustup update
    - uses: stellar/binaries@v52
      with:
        name: cargo-semver-checks
        version: 0.46.0
    - run: cargo semver-checks --exclude soroban-simulation

  build-and-test:
    runs-on:
      - namespace-profile-noble-24-04-stellar-core-x64-large;overrides.cache-tag=config-${{ matrix.rust }}-${{ matrix.sys.target }}
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        rust: [msrv, latest]
        test-protocol: [26]
        sys:
        - target: wasm32-unknown-unknown
          guest-only: false
          test: false
        - target: wasm32v1-none
          guest-only: true
          test: false
        - target: x86_64-unknown-linux-gnu
          guest-only: false
          test: true
        # TODO: Re-enable these builds if we see value in doing so.
        # - target: x86_64-apple-darwin
        #   test: true
        # - target: aarch64-apple-darwin
        #   test: false
        # - target: x86_64-pc-windows-msvc
        #   test: true
    steps:
    - uses: namespacelabs/nscloud-setup@v0
    - uses: namespacelabs/nscloud-checkout-action@v7
    - uses: stellar/binaries@v55
      with:
        name: sccache
        version: 0.14.0
    - name: Configure sccache with Namespace cache
      run: source setup-sccache.sh
    - name: Use the minimum supported Rust version
      if: matrix.rust == 'msrv'
      run: |
        msrv="$(cargo metadata --format-version 1 --no-deps | jq -r '.packages | map(.rust_version) | map(values) | min')"
        rustup override set $msrv
        rustup component add clippy --toolchain $msrv
    - run: rustup update
    - run: cargo version
    - run: rustup target add ${{ matrix.sys.target }}
    - uses: stellar/binaries@v52
      with:
        name: cargo-hack
        version: 0.6.35
    - if: ${{ matrix.sys.guest-only }}
      run: cargo clippy --locked --package soroban-env-guest --target ${{ matrix.sys.target }}
    - if: ${{ ! matrix.sys.guest-only }}
      run: cargo hack --each-feature clippy --locked --target ${{ matrix.sys.target }}
    - if: matrix.sys.test
      run: cargo hack --each-feature test --profile test-opt --locked --target ${{ matrix.sys.target }}
      env:
        TEST_PROTOCOL: ${{ matrix.test-protocol }}
    - name: Show sccache stats
      if: always()
      run: sccache -s

  publish-dry-run:
    if: github.event_name == 'push' || startsWith(github.head_ref, 'release/')
    strategy:
      matrix:
        sys:
          # Note: we use wasm32-unknown-unknown here not wasm32v1-none because
          # we are testing the ability to build the soroban host for use in a
          # browser, which requires a target with a stdlib. wasm32v1-none does
          # not have a stdlib and is the target used for building _contracts
          # that run in soroban_, not the host itself.
        - os: ubuntu-latest
          target: wasm32-unknown-unknown
        - os: ubuntu-latest
          target: x86_64-unknown-linux-gnu
    uses: stellar/actions/.github/workflows/rust-publish-dry-run.yml@main
    with:
      runs-on: ${{ matrix.sys.os }}
      target: ${{ matrix.sys.target }}
      cargo-hack-feature-options: --each-feature
